version: '3.8'

services:
  redis:
    image: redis
    container_name: redis-container
    ports:
      - "6379:6379"

  app:
    image: job-queue-app
    container_name: job-queue-container
    ports:
      - "8082:8081"
    depends_on:
      - redis
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379